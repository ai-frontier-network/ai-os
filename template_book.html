<article class="single-article fade-element">
    <div class="article-meta-header" style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px; font-size: 0.85rem;">
        <span class="intent-badge" style="background: var(--btn-bg); color: var(--btn-text);">AI Weekly Book</span>
        <span class="article-time" style="color: var(--text-muted); font-weight: 600;">発行日: {{DATE_JA}}</span>
    </div>
    
    <h2 class="article-main-title" style="font-size: 2.2rem; font-weight: 800; line-height: 1.4; margin-bottom: 30px; color: var(--text-color);">{{TITLE}}</h2>

    <!-- プチ書籍：メイン解説（AIが美しく書き下ろす大ボリュームHTMLがここに差し込まれます） -->
    <section class="book-content-body" style="font-size: 1.1rem; line-height: 2.0; color: var(--text-color); text-align: justify;">
        {{BOOK_CONTENT}}
    </section>

    <div style="text-align: center; margin-top: 60px; border-top: 1px solid var(--border-color); padding-top: 30px;">
        <a href="../index.html" style="font-size: 0.95rem; color: var(--text-muted); text-decoration: none; font-weight: 600;">&larr; トップページに戻る</a>
    </div>
</article>
