<article class="single-article fade-element">
    <div class="article-meta-header" style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px; font-size: 0.85rem;">
        <span class="intent-badge">{{SEARCH_INTENT}}</span>
        <span class="article-time" style="color: var(--text-muted); font-weight: 600;">更新日: {{DATE_JA}}</span>
    </div>
    
    <h2 class="article-main-title" style="font-size: 2rem; font-weight: 800; line-height: 1.4; margin-bottom: 25px; color: var(--text-color);">{{TITLE}}</h2>

    <div class="instant-answer-box" style="background: var(--bg-accent); padding: 20px; border-radius: 12px; border-left: 4px solid var(--btn-bg); margin-bottom: 35px;">
        <span style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted); display: block; margin-bottom: 6px; letter-spacing: 0.05em;">【3秒エリア】即答結論</span>
        <p style="font-size: 1.15rem; font-weight: 700; margin: 0; line-height: 1.5;">{{INSTANT_ANSWER}}</p>
    </div>

    <div class="article-body-content" style="font-size: 1.05rem; line-height: 1.85; color: var(--text-color); margin-bottom: 40px;">
        <h3 style="font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 8px;">📊 構造的背景の深掘り</h3>
        <p style="margin-bottom: 25px; text-align: justify;">{{SUMMARY_DETAIL}}</p>
    </div>

    <div class="cocoro-insight-card" style="background: var(--bg-accent); border: 1px solid var(--border-color); padding: 25px; border-radius: 16px; margin-bottom: 40px;">
        <h3 style="font-size: 1.2rem; font-weight: 800; margin-top: 0; margin-bottom: 15px; color: var(--text-color); display: flex; align-items: center; gap: 8px;">👁️ 編集長cocoroの眼</h3>
        <p style="font-size: 1rem; line-height: 1.8; color: var(--text-color); margin-bottom: 20px; text-align: justify; font-style: italic;">{{CHARO_INSIGHT}}</p>
        
        <div class="today-mission-box" style="background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px dashed var(--border-color);">
            <span style="font-size: 0.85rem; font-weight: 800; color: var(--text-color); display: block; margin-bottom: 6px;">💡 明日からの具体的ミッション</span>
            <p style="font-size: 0.95rem; line-height: 1.6; color: var(--text-color); margin: 0; font-weight: 600;">{{TODAY_MISSION}}</p>
        </div>
    </div>

    <div style="text-align: center; margin: 40px 0;">
        <a href="{{SOURCE_URL}}" target="_blank" rel="noopener" class="source-link" style="font-weight: 700; color: var(--text-color); text-decoration: underline;">一次情報ソース：{{SOURCE_NAME}} &rarr;</a>
    </div>

    <!-- Google AdSense 広告ユニット（記事末尾） -->
    <div class="adsense-container" style="text-align: center; margin: 40px 0; min-height: 250px;">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2908004621823900" crossorigin="anonymous"></script>
        <!-- 300×250 -->
        <ins class="adsbygoogle"
             style="display:inline-block;width:300px;height:250px"
             data-ad-client="ca-pub-2908004621823900"
             data-ad-slot="3799886389"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    
    <div style="text-align: center; margin-top: 50px;">
        <a href="../index.html" style="font-size: 0.95rem; color: var(--text-muted); text-decoration: none; font-weight: 600;">&larr; トップページに戻る</a>
    </div>
</article>
